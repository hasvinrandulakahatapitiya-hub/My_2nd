<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Settings | Academic Vitality</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght=400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: { extend: { colors: { "primary": "#340075", "primary-container": "#4c1d95", "surface-container-low": "#f6f2ff", "on-surface": "#181445", "on-surface-variant": "#4a4452" } } }
        }
    </script>
    <style> body { font-family: 'Manrope', sans-serif; min-height: 100dvh; background-color: #fcf8ff; } .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; } </style>
</head>
<body class="flex flex-col text-on-surface">
    <header class="w-full sticky top-0 z-50 bg-white shadow-sm flex justify-between items-center px-6 h-20 border-b">
        <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold">AV</div><h1 class="text-2xl font-bold text-primary">Academic Vitality</h1></div>
    </header>

    <div class="flex flex-1">
        <aside class="w-72 bg-surface-container-low p-6 border-r flex flex-col gap-1">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-primary/5 rounded-xl transition-all"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></a>
            <a href="directory.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-primary/5 rounded-xl transition-all"><span class="material-symbols-outlined">group</span><span>Directory</span></a>
            <a href="attendance.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-primary/5 rounded-xl transition-all"><span class="material-symbols-outlined">fingerprint</span><span>Attendance</span></a>
            <a href="id-cards.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-primary/5 rounded-xl transition-all"><span class="material-symbols-outlined">badge</span><span>ID Design</span></a>
            <a href="reports.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-primary/5 rounded-xl transition-all"><span class="material-symbols-outlined">analytics</span><span>Reports</span></a>
            <a href="settings.html" class="flex items-center gap-3 px-4 py-3 bg-primary-container text-white rounded-xl font-bold"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span><span>Settings</span></a>
        </aside>

        <main class="flex-grow p-8 space-y-6 max-w-2xl">
            <div><h2 class="text-3xl font-bold text-primary">System Settings</h2><p class="text-on-surface-variant">Configure system behaviors and preferences.</p></div>

            <div class="bg-white p-6 rounded-2xl border shadow-sm space-y-4">
                <h3 class="font-bold text-primary border-b pb-2">Academy Profile</h3>
                <div>
                    <label class="block text-sm font-semibold text-on-surface-variant mb-1">Institution Name</label>
                    <input type="text" class="w-full rounded-xl border-gray-300 focus:border-primary focus:ring-primary" value="St. Edwards Academy"/>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-on-surface-variant mb-1">Academic Session Year</label>
                    <input type="text" class="w-full rounded-xl border-gray-300 focus:border-primary focus:ring-primary" value="2024 - 2025"/>
                </div>
                <button class="bg-primary text-white font-bold px-6 py-2.5 rounded-xl hover:shadow-md transition-all">Save Adjustments</button>
            </div>
        </main>
    </div>
</body>
</html>
